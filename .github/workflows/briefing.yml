name: Daily Briefing

on:
  workflow_dispatch:
    inputs:
      run_label:
        description: 'Run label (e.g. Morning, Afternoon, Manual)'
        required: false
        default: 'Manual'

jobs:
  briefing:
    name: Send briefing
    runs-on: ubuntu-latest

    steps:
      - name: Resolve run label
        id: label
        run: echo "value=${{ github.event.inputs.run_label }}" >> "$GITHUB_OUTPUT"

      - name: Log run context
        run: echo "Trigger → ${{ github.event_name }} | Run label → ${{ steps.label.outputs.value }}"

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Send briefing
        run: npm start
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          NOTIFIER_BOT_TOKEN: ${{ secrets.NOTIFIER_BOT_TOKEN }}
          NOTIFIER_CHAT_ID: ${{ secrets.NOTIFIER_CHAT_ID }}
          RUN_LABEL: ${{ steps.label.outputs.value }}
